ai_tools_used:
  - "Claude"        # architecture design, code authoring, review
ai_usage_summary: |
  Used Claude (Anthropic) to analyze the dataset, design the multi-signal
  ranking architecture, and author/iterate rank.py. All design decisions —
  the role gate, honeypot heuristics, trust-weighted skill scoring, and weight
  tuning against the JD — were reviewed, understood, and validated by me on the
  real 100K pool. No candidate data was sent to any hosted LLM during ranking;
  the ranker itself makes zero LLM/API calls and runs fully offline on CPU.

# ----------------------------------------------------------------------------
methodology_summary: |
  Offline rules + TF-IDF ranker. Six sub-scores (role, career, semantic, skill,
  experience, location) combined into a base score, multiplied by a behavioral
  availability modifier and reduced by explicit JD red-flag penalties. A hard
  role gate zeroes non-engineering keyword-stuffers; a seven-rule honeypot
  detector floors internally impossible profiles (0 honeypots in our top 100);
  skills are trust-weighted by endorsements, duration, proficiency, and
  on-platform assessment so keyword stuffing fails. Half the scoring weight is
  NDCG@10, so the design prioritizes a clean, trap-free top of the list. Runs in
  ~2 min on a 16GB CPU machine with no network or GPU.

